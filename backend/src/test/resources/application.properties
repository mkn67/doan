spring.application.name=demo

# ===================================================================
# SỬA Ở ĐÂY: Dùng localhost để code và chạy test trực tiếp trên VS Code.
# Khi nào deploy lên Docker, biến môi trường trong docker-compose 
# sẽ tự động ghi đè cái localhost này thành oracle-db, cực kỳ tiện!
# Database name của image gvenzl/oracle-xe mặc định là XE (không phải FREEPDB1)
# ===================================================================
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/XE
spring.datasource.username=system
spring.datasource.password=oracle
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# ===================================================================
# JPA & Hibernate
# ===================================================================
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect

# ===================================================================
# Cấu hình Flyway
# ===================================================================
spring.flyway.enabled=true
spring.flyway.user=system
spring.flyway.password=oracle
spring.flyway.baseline-on-migrate=true

# BẮT BUỘC CÓ DÒNG NÀY ĐỂ CHẠY ĐƯỢC FILE SQL "KHỦNG BỐ" CỦA CẬU
# Nó giúp Flyway hiểu được cú pháp Procedure/Trigger của Oracle (Dấu /)
spring.flyway.oracle-sqlplus=true