spring.application.name=da


spring.datasource.url=jdbc:oracle:thin:@localhost:1521/XEPDB1
spring.datasource.username=KMY
spring.datasource.password=oracle
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.connection-properties=oracle.jdbc.defaultNChar=true

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh

spring.jpa.open-in-view=false
spring.devtools.restart.enabled=false

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

app.jwt.secret=${JWT_SECRET:DayLaMotChuoiBaoMatCucKyDaiVaPhucTapDeMaHoaTokenKadaDa2024}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
server.port=8080
# ============================================================
# 1. FIX LỖI ENCODING (Chữa bệnh chữ "?? khám")
# ============================================================
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
spring.messages.encoding=UTF-8
# Ép Oracle JDBC Driver phải chạy chuẩn UTF-8
spring.datasource.connection-properties=oracle.jdbc.defaultNChar=true;oracle.jdbc.convertNcharLiterals=true

# ============================================================
# 2. BẬT LOG BẮT BỆNH (Quan trọng để tìm lỗi 403/404)
# ============================================================
# Bật log này lên ông giáo sẽ thấy rõ tại sao Spring Security chặn 403
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
# Log Hibernate SQL với định dạng đẹp hơn
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# 3. CẤU HÌNH UPLOAD FILE (Cần thiết cho Vision Care)
# ============================================================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ============================================================
# 4. TỐI ƯU HÓA HIBERNATE (Tăng tốc độ cho các bảng lớn)
# ============================================================
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ============================================================
# 5. FIX LỖI "No handler found" (Để log báo lỗi 404 chuẩn hơn)
# ============================================================
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false
