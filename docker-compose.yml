version: '3.8'

services:
  # 1. DATABASE: Oracle 21c Express Edition
  oracle-db:
    image: container-registry.oracle.com/database/express:21.3.0-xe
    container_name: oracle_21c
    ports:
      - "1521:1521"
    environment:
      - ORACLE_PASSWORD=oracle
    volumes:
      - oracle-data:/opt/oracle/oradata
    networks:
      - nhom15-network

  # 2. BACKEND: Spring Boot (OpenJDK 21)
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: spring_backend_21
    ports:
      - "8080:8080"
    environment:
      # Kết nối dùng tên service 'oracle-db'. Service Name mặc định là XE.
      - SPRING_DATASOURCE_URL=jdbc:oracle:thin:@oracle-db:1521/XE
      - SPRING_DATASOURCE_USERNAME=system
      - SPRING_DATASOURCE_PASSWORD=oracle
      # Kích hoạt profile docker nếu m có file application-docker.properties
      - SPRING_PROFILES_ACTIVE=docker 
    depends_on:
      - oracle-db
    networks:
      - nhom15-network

  # 3. FRONTEND: React (Vite + Node 20)
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: react_frontend_vite
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules # Giữ lại node_modules trong container để tránh xung đột với máy thật
    environment:
      - CHOKIDAR_USEPOLLING=true # Giúp hot-reload chạy mượt trên Docker Windows
    depends_on:
      - backend
    networks:
      - nhom15-network

networks:
  nhom15-network:
    driver: bridge

volumes:
  oracle-data: