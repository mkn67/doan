services:
  # DATABASE
  oracle-db:
    image: container-registry.oracle.com/database/express:21.3.0-xe
    container_name: oracle_21c
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: oracle
    volumes:
      - oracle-data:/opt/oracle/oradata
    networks:
      - nhom15-network
    restart: always

  # BACKEND
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: spring_backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@oracle-db:1521/XE
      SPRING_DATASOURCE_USERNAME: system
      SPRING_DATASOURCE_PASSWORD: oracle
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - oracle-db
    networks:
      - nhom15-network
    restart: always

  # FRONTEND
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: react_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - nhom15-network
    restart: always

# KHAI BÁO NETWORKS (Chỗ này m thiếu nè)
networks:
  nhom15-network:
    driver: bridge

# KHAI BÁO VOLUMES
volumes:
  oracle-data: