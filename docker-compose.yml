services:
  # DATABASE - Dùng bản gvenzl/oracle-xe:21-slim cực nhẹ
  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle_21c_slim
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: oracle
    volumes:
      - oracle-data:/opt/oracle/oradata
    networks:
      - nhom15-network
    restart: always

  # BACKEND - Spring Boot
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: spring_backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@oracle-db:1521/XE
      SPRING_DATASOURCE_USERNAME: system
      SPRING_DATASOURCE_PASSWORD: oracle
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - oracle-db
    networks:
      - nhom15-network
    restart: always

  # FRONTEND - React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: react_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - nhom15-network
    restart: always

networks:
  nhom15-network:
    driver: bridge

volumes:
  oracle-data: