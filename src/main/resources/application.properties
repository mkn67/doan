spring.application.name=demo
# Kết nối thẳng bằng user KINH
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:XE
spring.datasource.username=KINH
spring.datasource.password=oracle
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA & Hibernate
spring.jpa.show-sql=true
# Khi dùng Flyway, hãy đổi ddl-auto thành 'none' hoặc 'validate' 
# để tránh Hibernate tự tạo bảng làm xung đột với Flyway
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect

# Cấu hình Flyway để quản lý 23 bảng cho nhóm
spring.flyway.enabled=true
spring.flyway.user=KINH
spring.flyway.password=oracle
spring.flyway.schemas=KINH
spring.flyway.baseline-on-migrate=true